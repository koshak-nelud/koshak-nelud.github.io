<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отзывы о саппортах - Legion of Mist</title>
    <link id="serverFavicon" rel="icon" href="https://cdn.discordapp.com/embed/avatars/0.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <img id="serverAvatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Discord">
                <span id="serverName">Legion of Mist</span>
            </a>
            <div class="nav-links">
                <a href="/">🏠 Главная</a>
                <a href="reviews.html" class="active">⭐ Отзывы</a>
                <a href="complaints.html">📋 Жалобы</a>
                <a href="honor.html">👑 Зал Славы</a>
                <a href="top.html">🏆 Топы</a>
                <div id="authButton"></div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="userStatus" class="alert" style="display: none;"></div>

        <div class="card" id="reviewFormCard" style="display: none;">
            <div class="card-header">
                <h2 class="card-title">✍️ Оставить отзыв</h2>
            </div>
            <form id="reviewForm">
                <div class="form-group">
                    <label for="supporter">👤 Выберите саппорта</label>
                    <select id="supporter" required>
                        <option value="">Загрузка...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="rating">⭐ Оценка</label>
                    <select id="rating" required>
                        <option value="5">5 - Отлично</option>
                        <option value="4">4 - Хорошо</option>
                        <option value="3">3 - Средне</option>
                        <option value="2">2 - Плохо</option>
                        <option value="1">1 - Ужасно</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="comment">💬 Комментарий</label>
                    <textarea id="comment" rows="4" placeholder="Расскажите о вашем опыте общения с саппортом..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary">📤 Отправить отзыв</button>
            </form>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">📝 Все отзывы</h2>
            </div>
            <div id="reviewsList">
                <div class="loading">Загрузка отзывов...</div>
            </div>
        </div>
    </div>

    <script src="reviews.js"></script>
</body>
</html>
